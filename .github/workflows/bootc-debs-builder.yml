name: Build & Publish Bootc .deb

on:
  workflow_dispatch:
  # à la main uniquement, tu rebuildes quand tu veux

jobs:
  build:
    runs-on: ubuntu-latest
    container: debian:trixie

    steps:
      - name: Install clone deps
        shell: bash
        run: |
          apt update
          apt install -y \
            ca-certificates \
            openssl \
            git \
            curl \
            wget

      - name: Checkout
        uses: actions/checkout@v7 
        with:
          submodules: recursive
      
      - name: Prepare environement
        shell: bash
        run: |
          cp -r ./workflows/bootc-debs-builder/preinstall/* /
          mkdir -p /{build,debs}

      - name: Install build deps
        shell: bash
        env:
          CARGO_HOME: "/build/rust"
          RUSTUP_HOME: "/build/rust"
        run: |
          apt update
          apt install -y \
            zstd \
            make \
            build-essential \
            go-md2man \
            libzstd-dev \
            pkgconf \
            autoconf \
            automake \
            libtool \
            libglib2.0-dev \
            libcurl4-openssl-dev \
            libgpgme-dev \
            libarchive-dev \
            libmount-dev \
            libfuse3-dev \
            libssl-dev \
            libsystemd-dev \
            gobject-introspection \
            libgirepository1.0-dev \
            libsoup-3.0-dev \
            bison \
            gperf \
            flex \
            gettext \
            python3 \
            autopoint \
            gawk \
            libfreetype6-dev

          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- --profile minimal -y

      - name: Build grub-efi-amd64-signed
        shell: bash
        env:
          GRUB_VER: "1+2.12+9+fedora44"
          GRUB_FEDORA_BRANCH: "fedora-44"
          GRUB_FALLBACK_COMMIT: "5e9e7e44eddcab0174decc12c3799825e600639f"
        run: |
          SAVE_PWD=$(pwd)

          git clone --branch "${GRUB_FEDORA_BRANCH}" \
            https://github.com/rhboot/grub2.git /build/grub2-fedora
          cd /build/grub2-fedora
          git checkout "${GRUB_FALLBACK_COMMIT}"

          ./bootstrap

          ./configure \
            --target=x86_64 \
            --with-platform=efi \
            --prefix=/usr \
            --disable-werror \
            MAKEINFO=true

          make -j$(nproc)

          GRUB_MODULES=" \
            all_video boot blscfg btrfs blsuki \
            cat configfile cryptodisk \
            echo ext2 f2fs fat font \
            gcry_rijndael gcry_rsa gcry_serpent \
            gcry_sha256 gcry_twofish gcry_whirlpool \
            gfxmenu gfxterm gzio \
            halt hfsplus http increment iso9660 \
            jpeg loadenv loopback linux lvm luks luks2 \
            memdisk mdraid09 mdraid1x minicmd net \
            normal part_apple part_msdos part_gpt \
            password_pbkdf2 pgp png reboot regexp \
            search search_fs_uuid search_fs_file \
            search_label serial sleep \
            squash4 syslinuxcfg \
            test tftp version video xfs zstd \
            efi_netfs efifwsetup efinet lsefi lsefimmap connectefi bli \
            backtrace chain tpm usb usbserial_common \
            usbserial_pl2303 usbserial_ftdi usbserial_usbdebug \
            keylayouts at_keyboard"

          mkdir -p \
            /output/grub-efi-amd64-signed/usr/lib/grub/x86_64-efi-signed

          ./grub-mkimage \
            -O x86_64-efi \
            -o /output/grub-efi-amd64-signed/usr/lib/grub/x86_64-efi-signed/grubx64.efi.signed \
            -d grub-core \
            -p /EFI/debian \
            ${GRUB_MODULES}

          cd /output/grub-efi-amd64-signed/
          ln -sf DEBIAN debian

          sed -i \
            -e "s|{{ VER }}|${GRUB_VER}|g" \
            DEBIAN/control

          rm -f debian
          dpkg-deb --build /output/grub-efi-amd64-signed \
            /debs/grub-efi-amd64-signed_${GRUB_VER}_amd64.deb

      - name: Build bootupd
        shell: bash
        env:
          CARGO_HOME: "/build/rust"
          RUSTUP_HOME: "/build/rust"
          BOOTUPD_VER: "v0.2.32"
        run: |
          SAVE_PWD=$(pwd)
          rm -rf /build/vendor && mkdir /build/vendor

          git clone --depth=1 --branch "${BOOTUPD_VER}" \
            https://github.com/coreos/bootupd.git /build/bootupd

          curl -fsSL \
            "https://github.com/coreos/bootupd/releases/download/${BOOTUPD_VER}/bootupd-${BOOTUPD_VER#v}-vendor.tar.zstd" \
            | tar --zstd -x -C /build/

          . ${RUSTUP_HOME}/env
          cargo build --release --manifest-path /build/bootupd/Cargo.toml

          make -C /build/bootupd install-all DESTDIR=/output/bootupd

          cd /output/bootupd/
          ln -sf DEBIAN debian

          dpkg-shlibdeps \
            -O /build/bootupd/target/release/bootupd \
            | sed 's/shlibs:Depends=//' > /tmp/bootupd-deps

          DEPS="$(cat /tmp/bootupd-deps), util-linux"
          sed -i \
            -e "s|{{ VER }}|${BOOTUPD_VER#v}|g" \
            -e "s|{{ DEPS }}|${DEPS}|g" \
            /output/bootupd/DEBIAN/control

          rm -f /output/bootupd/debian
          dpkg-deb --build /output/bootupd /debs/bootupd_${BOOTUPD_VER#v}_amd64.deb

      - name: Build libcomposefs
        shell: bash
        env:
          COMPOSEFS_VER: "v1.0.8"
        run: |
          git clone --depth=1 --branch "${COMPOSEFS_VER}" \
            https://github.com/composefs/composefs.git /build/composefs

          meson setup \
            --prefix=/usr \
            --libdir=/usr/lib \
            --buildtype=plain \
            /build/composefs-build \
            /build/composefs

          meson compile -C /build/composefs-build

          # Install to DESTDIR for packaging
          DESTDIR=/output/libcomposefs meson install -C /build/composefs-build

          # Install to system so ostree build finds it
          meson install -C /build/composefs-build

          cd /output/libcomposefs/
          ln -sf DEBIAN debian

          # Generate shlibs
          SO=$(find /output/libcomposefs/usr/lib -name "libcomposefs.so.*" ! -type l | head -1)
          SONAME=$(objdump -p $SO | awk '/SONAME/{print $2}')
          LIBBASE=$(echo $SONAME | sed 's/\.so\..*//')
          SOVERSION=$(echo $SONAME | sed 's/.*\.so\.//')
          echo "${LIBBASE} ${SOVERSION} libcomposefs" > /output/libcomposefs/DEBIAN/shlibs

          sed -i \
            -e "s|{{ VER }}|${COMPOSEFS_VER#v}|g" \
            DEBIAN/control

          rm -f debian
          dpkg-deb --build /output/libcomposefs \
            /debs/libcomposefs_${COMPOSEFS_VER#v}_amd64.deb

          # Enregistrer dans dpkg pour que dpkg-shlibdeps d'ostree fonctionne
          apt install -y /debs/libcomposefs_${COMPOSEFS_VER#v}_amd64.deb

      - name: Build ostree
        shell: bash
        env:
          CARGO_HOME: "/build/rust"
          RUSTUP_HOME: "/build/rust"
          OSTREE_VER: "2026.1"
        run: |
          SAVE_PWD=$(pwd)
          rm -rf /build/vendor && mkdir /build/vendor
          
          curl -fsSL \
            https://github.com/ostreedev/ostree/releases/download/v${OSTREE_VER}/libostree-${OSTREE_VER}.tar.xz \
            | tar -xJ -C /build
          cd /build/libostree-${OSTREE_VER}

          ./configure --prefix=/usr --sysconfdir=/etc \
            --disable-gtk-doc --disable-man \
            --with-composefs
          
          make -j$(nproc)
          make -j$(nproc) install DESTDIR=/output/ostree

          cd /output/ostree/
          ln -sf DEBIAN debian

          dpkg-shlibdeps \
            -l/output/ostree/usr/lib \
            -O $(find . -name "libostree-1.so*" ! -name "*.la" | head -1) \
            | sed 's/shlibs:Depends=//' > /tmp/ostree-deps

          SO=$(find /output/ostree/usr/lib -name "libostree-1.so.*" ! -name "*.la" ! -type l | head -1)
          SONAME=$(objdump -p $SO | awk '/SONAME/{print $2}')
          LIBBASE=$(echo $SONAME | sed 's/\.so\..*//')
          SOVERSION=$(echo $SONAME | sed 's/.*\.so\.//')
          echo "${LIBBASE} ${SOVERSION} libostree" > /output/ostree/DEBIAN/shlibs

          DEPS=$(cat /tmp/ostree-deps)
          sed -i \
            -e "s|{{ VER }}|${OSTREE_VER}|g" \
            -e "s|{{ DEPS }}|${DEPS}|g" \
            /output/ostree/DEBIAN/control
          cp -r "${SAVE_PWD}"/workflows/bootc-debs-builder/ostreepostinstall/* /output/ostree/
          
          rm -f /output/ostree/debian
          dpkg-deb --build /output/ostree /debs/libostree_${OSTREE_VER}_amd64.deb
          apt install -y /debs/libostree_${OSTREE_VER}_amd64.deb

      - name: Build bootc
        shell: bash
        env:
          CARGO_HOME: "/build/rust"
          RUSTUP_HOME: "/build/rust"
          BOOTC_VER: "v1.16.1"
        run: |
          SAVE_PWD=$(pwd)
          rm -rf /build/vendor && mkdir /build/vendor
          
          git clone --depth=1 --branch "${BOOTC_VER}" \
            https://github.com/bootc-dev/bootc.git /build/bootc
          
          curl -fsSL \
            https://github.com/bootc-dev/bootc/releases/download/${BOOTC_VER}/bootc-${BOOTC_VER#v}-vendor.tar.zstd \
            | tar --zstd -x -C /build/
          
          . ${RUSTUP_HOME}/env
          cargo build --release --manifest-path /build/bootc/Cargo.toml

          make -j$(nproc) -C /build/bootc manpages DESTDIR=/output/bootc
          make -C /build/bootc install-all DESTDIR=/output/bootc

          cd /output/bootc/
          ln -sf DEBIAN debian

          dpkg-shlibdeps \
            -l/output/ostree/usr/lib \
            -l/output/bootc/usr/lib \
            -S/output/ostree \
            -O /build/bootc/target/release/bootc \
            | sed 's/shlibs:Depends=//' > /tmp/bootc-deps
          
          DEPS=$(cat /tmp/bootc-deps)
          sed -i \
            -e "s|{{ VER }}|${BOOTC_VER#v}|g" \
            -e "s|{{ DEPS }}|${DEPS}|g"  \
            /output/bootc/DEBIAN/control
          cp -r "${SAVE_PWD}"/workflows/bootc-debs-builder/bootcpostinstall/* /output/bootc/
          
          chmod 755 \
            /output/bootc/DEBIAN/postinst \
            /output/bootc/usr/local/bin/bootc-finalize

          rm -f /output/bootc/debian
          dpkg-deb --build /output/bootc /debs/bootc_${BOOTC_VER#v}_amd64.deb

      
      - name: Upload debs
        uses: actions/upload-artifact@v4
        with:
          name: debs
          path: /debs/*.deb

  publish:
    runs-on: ubuntu-latest  # pas de container ici
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:

      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v4
        with:
          name: debs
          path: debs/

      - name: Create APT repo
        id: create-apt-repo
        uses: morph027/apt-repo-action@v3
        with:
          repo-name: debian-bootc
          signing-key: ${{ secrets.APT_GPG_KEY }}
          codename: trixie
          components: main
          architectures: amd64

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.create-apt-repo.outputs.dir }}

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4