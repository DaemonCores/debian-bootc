name: Build & Publish Bootc .deb

# Generic, manifest-driven builder. setup reads workflows/bootc-debs-builder/
# packages.yml, computes dependency waves (topological levels), and each wave is
# a matrix that builds its packages in parallel via the build-one-deb reusable
# workflow. A package with deps lands in a later wave and installs its deps'
# debs first. Independent packages all run together in wave 0.

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      any_rebuilt:
        description: 'true if at least one package was rebuilt (not cache-reused).'
        value: ${{ jobs.publish.outputs.any_rebuilt }}

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      wave0: ${{ steps.waves.outputs.wave0 }}
      wave1: ${{ steps.waves.outputs.wave1 }}
      wave2: ${{ steps.waves.outputs.wave2 }}
      wave3: ${{ steps.waves.outputs.wave3 }}
      env_image: ${{ steps.waves.outputs.env_image }}
    steps:
      - uses: actions/checkout@v7

      - name: Compute dependency waves
        id: waves
        shell: bash
        run: |
          set -euo pipefail
          echo "env_image=ghcr.io/${GITHUB_REPOSITORY,,}:buildenv" \
            >>"$GITHUB_OUTPUT"
          curl -fsSL \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 \
            -o /usr/local/bin/yq
          chmod +x /usr/local/bin/yq
          yq -o=json '.' workflows/bootc-debs-builder/packages.yml >/tmp/pkgs.json
          python3 - <<'PY'
          import json, os
          pkgs = json.load(open('/tmp/pkgs.json'))['packages']
          deps = {p['name']: (p.get('deps') or []) for p in pkgs}
          memo = {}
          def wave(name):
              if name in memo:
                  return memo[name]
              d = deps.get(name, [])
              memo[name] = 0 if not d else 1 + max(wave(x) for x in d)
              return memo[name]
          waves = {}
          for name in deps:
              waves.setdefault(wave(name), []).append(name)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              for i in range(4):
                  out.write("wave%d=%s\n" % (i, json.dumps(sorted(waves.get(i, [])))))
          PY

  wave0:
    needs: setup
    if: ${{ needs.setup.outputs.wave0 != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.setup.outputs.wave0) }}
    uses: DaemonCores/DaemonCores-CI/.github/workflows/build-one-deb.yml@main
    with:
      package: ${{ matrix.package }}
      container_image: ${{ needs.setup.outputs.env_image }}
    secrets: inherit

  wave1:
    needs: [setup, wave0]
    if: ${{ needs.setup.outputs.wave1 != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.setup.outputs.wave1) }}
    uses: DaemonCores/DaemonCores-CI/.github/workflows/build-one-deb.yml@main
    with:
      package: ${{ matrix.package }}
      container_image: ${{ needs.setup.outputs.env_image }}
    secrets: inherit

  wave2:
    needs: [setup, wave1]
    if: ${{ needs.setup.outputs.wave2 != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.setup.outputs.wave2) }}
    uses: DaemonCores/DaemonCores-CI/.github/workflows/build-one-deb.yml@main
    with:
      package: ${{ matrix.package }}
      container_image: ${{ needs.setup.outputs.env_image }}
    secrets: inherit

  wave3:
    needs: [setup, wave2]
    if: ${{ needs.setup.outputs.wave3 != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.setup.outputs.wave3) }}
    uses: DaemonCores/DaemonCores-CI/.github/workflows/build-one-deb.yml@main
    with:
      package: ${{ matrix.package }}
      container_image: ${{ needs.setup.outputs.env_image }}
    secrets: inherit

  publish:
    needs: [setup, wave0, wave1, wave2, wave3]
    # Run when the waves succeeded or were skipped (empty waves), but stop on a
    # cancel and skip if any wave failed.
    if: ${{ !cancelled() && !failure() }}
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    outputs:
      any_rebuilt: ${{ steps.end.outputs.any_rebuilt }}
    steps:
      - id: repo
        shell: bash
        run: |
          name="${GITHUB_REPOSITORY##*/}"          # cut at the slash -> repo name
          echo "name=${name,,}" >> "$GITHUB_OUTPUT"  # lowercase

      - id: end
        uses: DaemonCores/DaemonCores-CI/bootc-debs-end@main
        with:
          repo_name: ${{ steps.repo.outputs.name }}
          apt_gpg_key: ${{ secrets.APT_GPG_KEY }}
