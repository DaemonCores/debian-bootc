name: iso

on:
  workflow_dispatch: {}
  workflow_call:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    container:
      image: almalinux:10
      # --privileged is required for loop mount (mount -o loop) when extracting
      # and repacking squashfs/ISO images. Do not remove.
      options: --privileged
    permissions:
      contents: write

    steps:

      - uses: actions/checkout@v7

      # ─── INSTALL ─────────────────────────────────────────────────────────

      - name: Install dependencies
        run: |
          dnf install -y epel-release
          dnf install -y 'dnf-command(config-manager)'
          dnf config-manager -y \
            --add-repo https://cli.github.com/packages/rpm/gh-cli.repo
          dnf makecache --refresh
          dnf install -y git gh xorriso squashfs-tools ImageMagick lorax curl cpio gzip podman fuse-overlayfs isomd5sum
          git config --system --add safe.directory '*'

          COSIGN_VER=$(curl -fsSL https://api.github.com/repos/sigstore/cosign/releases/latest \
            | grep tag_name | cut -d: -f2 | tr -d 'v", ')

          COSIGN_API=$(curl -fsSL -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/sigstore/cosign/releases/latest)

          COSIGN_VER=$(printf '%s' "${COSIGN_API}" \
            | grep '"tag_name"' \
            | cut -d'"' -f4 \
            | tr -d 'v')

          COSIGN_SHA256=$(printf '%s' "${COSIGN_API}" | awk \
            -v rpm="cosign-${COSIGN_VER}-1.x86_64.rpm" '
            $0 ~ "\"name\": \"" rpm "\"" { found=1 }
            found && /"digest"/ {
              gsub(/.*"sha256:/, ""); gsub(/".*/, ""); print; exit
            }
          ')

          curl -fsSL \
            "https://github.com/sigstore/cosign/releases/download/v${COSIGN_VER}/cosign-${COSIGN_VER}-1.x86_64.rpm" \
            -o /tmp/cosign.rpm

          printf '%s  /tmp/cosign.rpm\n' "${COSIGN_SHA256}" | sha256sum -c -

          rpm -ivh /tmp/cosign.rpm
          rm -f /tmp/cosign.rpm

      # ─── VARIABLES ───────────────────────────────────────────────────────

      - name: Compute names
        id: names
        run: |
          NAME="$(echo "${{ github.repository }}" | sed 's|/|-|g')"
          HOSTNAME="$(echo "${{ github.repository }}" | cut -d "/" -f 2)"
          DISPLAY_NAME=$(python3 -c "
          h = '${HOSTNAME}'.replace('-',' ').replace('_',' ')
          print(' '.join(w.capitalize() for w in h.split()))
          ")
          BASE="$(echo "${HOSTNAME}" | tr '[:lower:]-' '[:upper:]_')"
          echo "name=${NAME}"                                             >> "$GITHUB_OUTPUT"
          echo "hostname=${HOSTNAME}"                                     >> "$GITHUB_OUTPUT"
          echo "display_name=${DISPLAY_NAME}"                             >> "$GITHUB_OUTPUT"
          echo "volume_id_online=$(echo "${BASE}_NET"      | cut -c1-32)" >> "$GITHUB_OUTPUT"
          echo "volume_id_offline=$(echo "${BASE}_OFFLINE" | cut -c1-32)" >> "$GITHUB_OUTPUT"
          echo "isoonline=${NAME}-online.iso"                             >> "$GITHUB_OUTPUT"
          echo "isooffline=${NAME}-offline.iso"                           >> "$GITHUB_OUTPUT"

      # ─── RELEASE ────────────────────────────────────────────────────────

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NAME="$(echo "${{ github.repository }}" | sed 's|/|-|g')"
          title="Install ISO — $(date -u +%Y-%m-%d)"
          notes="Net-install and offline ISOs for ${NAME}."
          if gh release view install-iso \
               --repo "${{ github.repository }}" \
               --json name >/dev/null 2>&1; then
            gh release edit install-iso \
              --repo    "${{ github.repository }}" \
              --title   "$title" \
              --notes   "$notes" \
              --target  "${{ github.sha }}" \
              --latest=false
          else
            gh release create install-iso \
              --repo    "${{ github.repository }}" \
              --title   "$title" \
              --notes   "$notes" \
              --target  "${{ github.sha }}" \
              --latest=false
          fi

      # ─── DOWNLOAD ────────────────────────────────────────────────────────

      - name: Download Fedora netinstall ISO
        env:
          VERSION: "44-1.7"
        run: |
          CUT="$(echo "${VERSION}" | cut -d '-' -f 1)"
          mkdir -p out
          curl -fSL \
            "https://archives.fedoraproject.org/pub/fedora/linux/releases/${CUT}/Server/x86_64/iso/Fedora-Server-netinst-x86_64-${VERSION}.iso" \
            -o out/base.iso

      # ─── CUSTOMIZE ───────────────────────────────────────────────────────

      - name: Customize ISO
        run: |
          bash scripts/inject-iso.sh out/base.iso out/customized.iso "${{ steps.names.outputs.display_name }}"
          mv out/customized.iso out/base.iso

      # ─── VERIFY IMAGE SIGNATURE ─────────────────────────────────────────
      - name: Verify image signature
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          cosign verify \
            --certificate-identity-regexp="^https://github.com/${{ github.repository }}/.*" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            "ghcr.io/${GITHUB_REPOSITORY,,}:latest"

      # ─── IMAGE ───────────────────────────────────────────────────────────
      - name: Pull and save OCI image for offline ISO
        run: |
          podman pull "ghcr.io/${GITHUB_REPOSITORY,,}:latest"
          mkdir -p out
          podman save \
            --format oci-archive \
            -o out/image.tar \
            "ghcr.io/${GITHUB_REPOSITORY,,}:latest"

      # ─── KICKSTART ───────────────────────────────────────────────────────

      - name: Render kickstart
        shell: bash
        run: |
          set -euxo pipefail
          NAME="${{ steps.names.outputs.name }}"

          dualiso() {
            sed \
              -e "s|{{ repo }}|${GITHUB_REPOSITORY,,}|g" \
              -e "s|{{ hostname }}|${{ steps.names.outputs.hostname }}|g" \
              iso-${1}-config.ks.tpl > /tmp/iso-${1}-config.ks
          }

          dualiso offline &
          dualiso online &
          wait

      # ─── ISO ──────────────────────────────────────────────────────────────
      
      - name: Build online ISO
        shell: bash
        run: |
          set -euxo pipefail
          NAME="${{ steps.names.outputs.name }}"

          dualiso() {
            local TYPE="$1"
            local VOL_ID
            [[ "$TYPE" == "offline" ]] \
              && VOL_ID="${{ steps.names.outputs.volume_id_offline }}" \
              || VOL_ID="${{ steps.names.outputs.volume_id_online }}"
            local DISPLAY="${{ steps.names.outputs.display_name }}"
            local EXTRA_ADD=""
            [[ "$TYPE" == "offline" ]] && EXTRA_ADD="--add out/image.tar"

            mkksiso \
              --ks   "/tmp/iso-${TYPE}-config.ks" \
              ${EXTRA_ADD} \
              -V    "${VOL_ID}" \
              out/base.iso \
              "out/boot-${TYPE}-tmp.iso"

            # Patch both EFI and BIOS grub.cfg with correct volume label and display name
            mkdir -p "/tmp/mnt-${TYPE}"
            mount -o loop,ro "out/boot-${TYPE}-tmp.iso" "/tmp/mnt-${TYPE}"
            cp "/tmp/mnt-${TYPE}/EFI/BOOT/grub.cfg"   "/tmp/grub-efi-${TYPE}.cfg"
            cp "/tmp/mnt-${TYPE}/boot/grub2/grub.cfg"  "/tmp/grub-bios-${TYPE}.cfg"
            umount "/tmp/mnt-${TYPE}"

            for f in "/tmp/grub-efi-${TYPE}.cfg" "/tmp/grub-bios-${TYPE}.cfg"; do
              sed -i \
                -e "s|Fedora-S-dvd-x86_64-44|${VOL_ID}|g" \
                -e "s|Install Fedora 44 in basic graphics mode|Install ${DISPLAY} in basic graphics mode|g" \
                -e "s|Install Fedora 44|Install ${DISPLAY}|g" \
                -e "s|Test this media & install Fedora 44|Test media \& install ${DISPLAY}|g" \
                -e "s| inst\.stage2=[^ ]*||g" \
                -e "/^[[:space:]]*linux / s|$| inst.stage2=hd:LABEL=${VOL_ID}|" \
                "$f"
            done

            # Inject patched grub configs and set ISO metadata
            xorriso \
              -return_with SORRY 0 \
              -indev  "out/boot-${TYPE}-tmp.iso" \
              -outdev "out/${NAME}-${TYPE}.iso" \
              -map "/tmp/grub-efi-${TYPE}.cfg"  /EFI/BOOT/grub.cfg \
              -map "/tmp/grub-bios-${TYPE}.cfg" /boot/grub2/grub.cfg \
              -application_id "${DISPLAY} Installer" \
              -publisher      "${DISPLAY}" \
              -boot_image any replay

            # Re-implant MD5 checksum so media verification still works
            implantisomd5 "out/${NAME}-${TYPE}.iso"

            rm "out/boot-${TYPE}-tmp.iso"
          }

          dualiso offline &
          dualiso online &
          wait

      # ─── UPLOAD ────────────────────────────────────────────────────────────

      - name: Upload ISO to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          NAME="${{ steps.names.outputs.name }}"

          dualiso() {
            gh release upload install-iso \
              --repo "${{ github.repository }}" \
              "out/${NAME}-${1}.iso" --clobber
          }

          dualiso offline &
          dualiso online &
          wait