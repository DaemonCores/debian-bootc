name: iso

on:
  workflow_dispatch: {}

jobs:
  build-iso:
    runs-on: ubuntu-latest
    container:
      image: almalinux:10
      options: --privileged
    permissions:
      contents: write

    steps:

      - uses: actions/checkout@v7

      # ─── RELEASE ────────────────────────────────────────────────────────

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NAME="$(echo "${{ github.repository }}" | sed 's|/|-|g')"
          title="Install ISO — $(date -u +%Y-%m-%d)"
          notes="Net-install and offline ISOs for ${NAME}."
          if gh release view install-iso \
               --repo "${{ github.repository }}" \
               --json name >/dev/null 2>&1; then
            gh release edit install-iso \
              --repo    "${{ github.repository }}" \
              --title   "$title" \
              --notes   "$notes" \
              --target  "${{ github.sha }}" \
              --latest=false
          else
            gh release create install-iso \
              --repo    "${{ github.repository }}" \
              --title   "$title" \
              --notes   "$notes" \
              --target  "${{ github.sha }}" \
              --latest=false
          fi

      # ─── INSTALL ─────────────────────────────────────────────────────────

      - name: Install dependencies
        run: |
          dnf install -y epel-release
          dnf install -y 'dnf-command(config-manager)'
          dnf config-manager -y \
            --add-repo https://cli.github.com/packages/rpm/gh-cli.repo
          dnf makecache --refresh
          dnf install -y git gh xorriso squashfs-tools ImageMagick lorax curl cpio gzip podman fuse-overlayfs
          git config --system --add safe.directory '*'

      # ─── VARIABLES ───────────────────────────────────────────────────────

      - name: Compute names
        id: names
        run: |
          NAME="$(echo "${{ github.repository }}" | sed 's|/|-|g')"
          HOSTNAME="$(echo "${{ github.repository }}" | cut -d "/" -f 2)"
          DISPLAY_NAME=$(python3 -c "
          h = '${HOSTNAME}'.replace('-',' ').replace('_',' ')
          print(' '.join(w.capitalize() for w in h.split()))
          ")
          BASE="$(echo "${HOSTNAME}" | tr '[:lower:]-' '[:upper:]_')"
          echo "name=${NAME}"                                             >> "$GITHUB_OUTPUT"
          echo "hostname=${HOSTNAME}"                                     >> "$GITHUB_OUTPUT"
          echo "display_name=${DISPLAY_NAME}"                             >> "$GITHUB_OUTPUT"
          echo "volume_id_online=$(echo "${BASE}_NET"      | cut -c1-32)" >> "$GITHUB_OUTPUT"
          echo "volume_id_offline=$(echo "${BASE}_OFFLINE" | cut -c1-32)" >> "$GITHUB_OUTPUT"
          echo "isoonline=${NAME}-online.iso"                             >> "$GITHUB_OUTPUT"
          echo "isooffline=${NAME}-offline.iso"                           >> "$GITHUB_OUTPUT"

      # ─── DOWNLOAD ────────────────────────────────────────────────────────

      - name: Download Fedora netinstall ISO
        env:
          VERSION: "44-1.7"
        run: |
          CUT="$(echo "${VERSION}" | cut -d '-' -f 1)"
          mkdir -p out
          curl -fSL \
            "https://archives.fedoraproject.org/pub/fedora/linux/releases/${CUT}/Server/x86_64/iso/Fedora-Server-netinst-x86_64-${VERSION}.iso" \
            -o out/base.iso

      # ─── PATCH  ──────────────────────────────────────────────────────────

      - name: Build updates.img — disable Anaconda Users module
        run: |
          mkdir -p updates-tree/etc/anaconda/conf.d
          printf '%s\n' \
            '[Anaconda]' \
            'optional_modules =' \
            '  org.fedoraproject.Anaconda.Modules.Localization' \
            '  org.fedoraproject.Anaconda.Modules.Network' \
            '  org.fedoraproject.Anaconda.Modules.Payloads' \
            '  org.fedoraproject.Anaconda.Modules.Storage' \
            '  org.fedoraproject.Anaconda.Modules.Services' \
            '  org.fedoraproject.Anaconda.Modules.Timezone' \
            '  org.fedoraproject.Anaconda.Modules.Security' \
            '  org.fedoraproject.Anaconda.Modules.Subscription' \
            > updates-tree/etc/anaconda/conf.d/99-disable-users.conf
          (cd updates-tree && find . | cpio -o -H newc | gzip > ../out/updates.img)

      # ─── GRUB ───────────────────────────────────────────────────────────

      - name: Rename GRUB boot entries
        run: |
          set -euo pipefail
          ISO="out/base.iso"
          DISPLAY="${{ steps.names.outputs.display_name }}"
          mkdir -p /tmp/iso-mnt
          mount -o loop,ro "${ISO}" /tmp/iso-mnt

          cp /tmp/iso-mnt/EFI/BOOT/grub.cfg   /tmp/grub.cfg         2>/dev/null || true
          cp /tmp/iso-mnt/isolinux/isolinux.cfg /tmp/isolinux.cfg    2>/dev/null || true

          umount /tmp/iso-mnt

          # rename entries
          if [[ -f /tmp/grub.cfg ]]; then
            sed -i \
              -e "s|Install Fedora Server [0-9.]* or later|Install ${DISPLAY}|g" \
              -e "s|Test this media & install Fedora Server [0-9.]* or later|Test media \& install ${DISPLAY}|g" \
              /tmp/grub.cfg
          fi

          if [[ -f /tmp/isolinux.cfg ]]; then
            sed -i \
              -e "s|Install Fedora Server [0-9.]* or later|Install ${DISPLAY}|g" \
              -e "s|Test this media & install Fedora Server [0-9.]* or later|Test media \& install ${DISPLAY}|g" \
              /tmp/isolinux.cfg
          fi

          # Rewrite in ISO
          mv "${ISO}" "${ISO}.tmp"
          XORRISO_MAPS=()
          [[ -f /tmp/grub.cfg     ]] && XORRISO_MAPS+=(-map /tmp/grub.cfg     /EFI/BOOT/grub.cfg)
          [[ -f /tmp/isolinux.cfg ]] && XORRISO_MAPS+=(-map /tmp/isolinux.cfg /isolinux/isolinux.cfg)
          xorriso \
            -return_with SORRY 0 \
            -indev  "${ISO}.tmp" \
            -outdev "${ISO}" \
            "${XORRISO_MAPS[@]}" \
            -boot_image any replay 2>/dev/null
          rm "${ISO}.tmp"

      # ─── BANNER ──────────────────────────────────────────────────────────

      - name: Inject banners (optional)
        run: |
          ISO="out/base.iso"
          if [[ -f "assets/banner/anaconda-sidebar.png" || \
                -f "assets/banner/anaconda-header.png" ]]; then
            bash scripts/inject-banners-iso.sh "${ISO}" out/branded.iso
            mv out/branded.iso "${ISO}"
          fi


      # ─── IMAGE ───────────────────────────────────────────────────────────
      - name: Pull et sauvegarde image OCI
        run: |
          podman pull "ghcr.io/${GITHUB_REPOSITORY,,}:latest"
          mkdir -p out
          podman save \
            --format oci-archive \
            -o out/image.tar \
            "ghcr.io/${GITHUB_REPOSITORY,,}:latest"

      # ─── KISKSTART ───────────────────────────────────────────────────────

      - name: Render kickstart
        shell: bash
        run: |
          set -euxo pipefail
          NAME="${{ steps.names.outputs.NAME }}"

          dualiso() {
            sed \
              -e "s|{{ repo }}|${GITHUB_REPOSITORY,,}|g" \
              -e "s|{{ hostname }}|${{ steps.names.outputs.hostname }}|g" \
              iso-${1}-config.ks.tpl > /tmp/iso-${1}-config.ks.ks
          }

          dualiso offline &
          dualiso online &
          wait

      # ─── ISO ──────────────────────────────────────────────────────────────
      
      - name: Build online ISO
        shell: bash
        run: |
          set -euxo pipefail
          NAME="${{ steps.names.outputs.NAME }}"

          dualiso() {
            mkksiso \
              --ks /tmp/iso-${1}-config.ks.ks \
              --add out/updates.img \
              $([ "${1}" == "offline" ] && echo "--add out/image.tar" || true) \
              --cmdline "inst.updates=file:///run/install/repo/updates.img" \
              -V $([ "${1}" == "offline" ] \
                && echo "${{ steps.names.outputs.volume_id_offline }}"
                || echo "${{ steps.names.outputs.volume_id_online }}"
              ) \
              out/base.iso \
              out/boot-${1}-tmp.iso
            
            xorriso \
              -return_with SORRY 0 \
              -indev  out/boot-${1}-tmp.iso \
              -outdev "out/${NAME}-${1}.iso" \
              -application_id "${{ steps.names.outputs.display_name }} Installer" \
              -publisher      "${{ steps.names.outputs.display_name }}" \
              -boot_image any replay
            rm "out/boot-${1}-tmp.iso"
          }

          dualiso offline &
          dualiso online &
          wait

      # ─── UPLOAD ────────────────────────────────────────────────────────────

      - name: Upload ISO to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          NAME="${{ steps.names.outputs.NAME }}"

          dualiso() {
            gh release upload install-iso \
              --repo "${{ github.repository }}" \
              "out/${NAME}-${1}.iso" --clobber
          }

          dualiso offline &
          dualiso online &
          wait