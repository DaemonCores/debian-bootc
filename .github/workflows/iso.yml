name: iso

on:
  workflow_dispatch: {}

jobs:
  iso:
    runs-on: ubuntu-latest
    container:
      image: almalinux:10
      options: --privileged

    permissions:
      contents: write
    steps:

      - name: Install lorax
        run: |
          dnf install -y 'dnf-command(config-manager)'
          dnf config-manager -y --add-repo https://cli.github.com/packages/rpm/gh-cli.repo
          dnf makecache --refresh
          dnf install -y lorax git wget curl gh gh
          git config --system --add safe.directory '*'

      - uses: actions/checkout@v7

      - name: Download Fedora 44 Server netinstall ISO
        run: |
          mkdir -p out
          curl -fSL \
            "https://download.fedoraproject.org/pub/fedora/linux/releases/44/Server/x86_64/iso/Fedora-Server-netinst-x86_64-44-1.7.iso" \
            -o out/boot.iso

      - name: Inject kickstart URL into ISO
        run: |
          set -euxo pipefail

          NAME="$(echo "${{ github.repository }}" | sed 's|/|-|g')"
          HOSTNAME="$(echo "${{ github.repository }}" | cut -d "/" -f 2)"
          sed -i \
            -e "s|{{ repo }}|${GITHUB_REPOSITORY,,}|g" \
            -e "s|{{ hostname }}|${HOSTNAME}|g" \
            iso.ks

          mkksiso --ks iso.ks out/boot.iso "out/${NAME}.iso"
          ls -lh "out/${NAME}.iso"

      - name: Fetch previous release state
        id: prev
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view install-iso --json name >/dev/null 2>&1; then
            echo "exists=1" >> "$GITHUB_OUTPUT"
          else
            echo "exists=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          NAME="$(echo "${{ github.repository }}" | sed 's|/|-|g')"
          title="Net-install ISO — $(date -u +%Y-%m-%d)"
          notes="Boot this ISO to install ${NAME}. Anaconda fetches the kickstart from GitHub and pulls the latest image from GHCR at install time."
          if [[ "${{ steps.prev.outputs.exists }}" == "1" ]]; then
            gh release edit install-iso \
              --title "$title" --notes "$notes" \
              --target "${{ github.sha }}" --latest=false
            gh release upload install-iso "out/${NAME}.iso" --clobber
          else
            gh release create install-iso "out/${NAME}.iso" \
              --title "$title" --notes "$notes" \
              --target "${{ github.sha }}" --latest=false
          fi
