name: Container Image CI

on:
  schedule:
    - cron: '0 4 1 * *'
  push:
    paths:
      - Containerfile
      - .dockerignore
      - src/**
  workflow_dispatch:

jobs:
  build-test-push:
    name: Build, Test & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android \
            /opt/ghc /opt/hostedtoolcache/CodeQL /usr/local/share/boost
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.PAT_PKG }}" | \
            podman login ghcr.io \
              --username "${{ github.actor }}" \
              --password-stdin
          echo "${{ secrets.PAT_PKG }}" | \
            docker login ghcr.io \
              --username "${{ github.actor }}" \
              --password-stdin
      - name: Build
        run: |
          NO_CACHE=""
          MONTHLY_TAG=""
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            NO_CACHE="--no-cache"
            MONTHLY_TAG="--tag ${IMAGE}:monthly-$(date -u +%Y%m%d)"
          fi

          podman build \
            $NO_CACHE \
            --tag "${IMAGE}:latest" \
            --tag "${IMAGE}:$(git rev-parse --short HEAD)" \
            $MONTHLY_TAG \
            -f Containerfile \
            .

      - name: Check runtime deps
        run: |
          podman run --rm "${IMAGE}:latest" \
            sh -c "ldd /usr/bin/bootc && ldd /usr/lib/libostree-1.so*"

      - name: Smoke test
        run: |
          podman run --rm "${IMAGE}:latest" bootc container lint

      - name: Push
        if: github.ref == 'refs/heads/main'
        id: push
        run: |
          podman push --digestfile /tmp/digest.txt "${IMAGE}:latest"
          podman push "${IMAGE}:$(git rev-parse --short HEAD)"
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            podman push "${IMAGE}:monthly-$(date -u +%Y%m%d)"
          fi
          echo "digest=$(cat /tmp/digest.txt)" >> $GITHUB_OUTPUT

      - name: Install cosign
        if: github.ref == 'refs/heads/main'
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        if: github.ref == 'refs/heads/main'
        run: |
          cosign sign --yes "${IMAGE}@${{ steps.push.outputs.digest }}"