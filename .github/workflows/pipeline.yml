name: Full Pipeline

on:
  workflow_dispatch:
    inputs:
      run_debs:
        description: 'Build .deb packages'
        type: boolean
        default: true
      run_iso:
        description: 'Build ISO'
        type: boolean
        default: true
      run_image:
        description: 'Build container image'
        type: boolean
        default: true

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write

jobs:
  debs:
    name: Build .deb packages
    if: ${{ inputs.run_debs }}
    uses: ./.github/workflows/bootc-debs-builder.yml
    secrets: inherit

  image:
    name: Build container image
    needs: [debs]
    # always() force l'évaluation même si debs est skippé.
    # image tourne si : coché ET (debs ok OU debs skippé/non sélectionné).
    if: |
      always() &&
      inputs.run_image &&
      (needs.debs.result == 'success' || needs.debs.result == 'skipped')
    uses: ./.github/workflows/bootc-build.yml
    secrets: inherit

  iso:
    name: Build ISO
    needs: [debs, image]
    # always() force l'évaluation même si debs ou image sont skippés.
    # iso tourne si : coché ET (debs ok OU skippé) ET (image ok OU skippé).
    if: |
      always() &&
      inputs.run_iso &&
      (needs.debs.result == 'success' || needs.debs.result == 'skipped') &&
      (needs.image.result == 'success' || needs.image.result == 'skipped')
    uses: ./.github/workflows/iso.yml
    secrets: inherit