# Package manifest for the bootc .deb builder.
# One entry per package. Consumed by the generic bootc-debs-builder workflow
# (setup computes dependency waves) and by the build-one-deb reusable workflow.
#   name       logical package name
#   upstream   apt package to repack (omit for from-source / custom packages)
#   deps       packages that must be built+installed first (creates a wave)
#   sources    paths under workflows/bootc-debs-builder/ hashed for change
#   deb-glob   output deb glob when it differs from <name>_*
#   env        non-secret KEY: VALUE exported for the build (also hashed)
#   secret-env ENV_VAR: SECRET_NAME injected from secrets (never hashed)
#   build      the exact build script, verbatim
packages:
  - name: firstboot-user-setup
    sources:
      - firstbootpostinstall
      - preinstall/output/firstboot-user-setup
    env:
      FIRSTBOOT_VER: "1.0.2"
    build: |
      SAVE_PWD=$(pwd)

      cp -r "${SAVE_PWD}"/workflows/bootc-debs-builder/firstbootpostinstall/* \
        /output/firstboot-user-setup/

      chmod 755 \
        /output/firstboot-user-setup/usr/local/bin/firstboot-user-setup

      sed -i \
        -e "s|{{ VER }}|${FIRSTBOOT_VER}|g" \
        -e "s|, {{ DEPS }}||g" \
        /output/firstboot-user-setup/DEBIAN/control

      dpkg-deb --build /output/firstboot-user-setup \
        /debs/firstboot-user-setup_${FIRSTBOOT_VER}_all.deb

  - name: ifupdown2
    upstream: ifupdown2
    sources:
      - ifupdown2postinstall
    build: |
      SAVE_PWD=$(pwd)

      apt update
      cd /tmp
      apt-get download ifupdown2

      mkdir -p /output/ifupdown2
      dpkg-deb -R /tmp/ifupdown2_*.deb /output/ifupdown2

      ORIG_VER=$(dpkg-deb -f /tmp/ifupdown2_*.deb Version)

      cp -r "${SAVE_PWD}"/workflows/bootc-debs-builder/ifupdown2postinstall/* \
        /output/ifupdown2/

      # Regenerate md5sums after content modification
      find /output/ifupdown2 -not -path '*/DEBIAN/*' -type f \
        | xargs md5sum \
        | sed "s|/output/ifupdown2/||" \
        > /output/ifupdown2/DEBIAN/md5sums

      # Preserve +pmx suffix for pve-manager version check
      sed -i "s/^Version: .*/Version: 1:${ORIG_VER}+bootc2/" \
        /output/ifupdown2/DEBIAN/control
      chmod +x /output/ifupdown2/usr/sbin/ifupdown2-autoconf \
        /output/ifupdown2/usr/sbin/domain-set

      dpkg-deb --build /output/ifupdown2 \
        /debs/ifupdown2_${ORIG_VER}+bootc1_all.deb

  - name: systemd-timesyncd
    upstream: systemd-timesyncd
    sources:
      - timesyncpostinstall
    build: |
      SAVE_PWD=$(pwd)

      apt update
      cd /tmp
      apt-get download systemd-timesyncd

      mkdir -p /output/systemd-timesyncd
      dpkg-deb -R systemd-timesyncd_*.deb /output/systemd-timesyncd

      ORIG_VER=$(dpkg-deb -f systemd-timesyncd_*.deb Version)
      ARCH=$(dpkg-deb -f systemd-timesyncd_*.deb Architecture)

      cp -r "${SAVE_PWD}"/workflows/bootc-debs-builder/timesyncpostinstall/* \
        /output/systemd-timesyncd/

      # Regenerate md5sums after content modification
      find /output/systemd-timesyncd -not -path '*/DEBIAN/*' -type f \
        | xargs md5sum \
        | sed "s|/output/systemd-timesyncd/||" \
        > /output/systemd-timesyncd/DEBIAN/md5sums

      sed -i "s/^Version: .*/Version: 1:${ORIG_VER}+bootc1/" \
        /output/systemd-timesyncd/DEBIAN/control

      dpkg-deb --build /output/systemd-timesyncd \
        /debs/systemd-timesyncd_${ORIG_VER}+bootc1_${ARCH}.deb

  - name: grub-efi-amd64-signed
    sources:
      - preinstall/output/grub-efi-amd64-signed
    env:
      GRUB_VER: "1+2.12+9+fedora44"
      GRUB_FEDORA_BRANCH: fedora-44
      GRUB_PINNED_COMMIT: "5e9e7e44eddcab0174decc12c3799825e600639f"
    secret-env:
      SB_SIGNING_KEY: SB_SIGNING_KEY
      SB_SIGNING_CERT: SB_SIGNING_CERT
    build: |
      SAVE_PWD=$(pwd)
      trap 'rm -f /tmp/sb.key /tmp/sb.crt' EXIT

      git clone --branch "${GRUB_FEDORA_BRANCH}" \
        https://github.com/rhboot/grub2.git /build/grub2-fedora
      cd /build/grub2-fedora
      git checkout "${GRUB_PINNED_COMMIT}"

      ./bootstrap

      # --program-transform-name renames the userspace tools grub-* -> grub2-*.
      # The Fedora source's own mkconfig scripts call grub2-probe/grub2-mkrelpath
      # internally and bootupd invokes grub2-editenv/install/mkconfig, so the
      # grub2 naming is the native, consistent one here (matching the EFI binary
      # we build from the same tree). We drop Debian's grub-common entirely.
      ./configure \
        --target=x86_64 \
        --with-platform=efi \
        --prefix=/usr \
        --disable-werror \
        --program-transform-name='s,grub,grub2,' \
        MAKEINFO=true

      make -j$(nproc)

      # Install the full grub userspace (grub2-* tools + x86_64-efi modules +
      # fonts + locale) into the deb. Previously the package shipped only the
      # signed EFI binary, so the installed system had no grub tooling at all and
      # bootupd could never self-update. This is the core of the fix.
      make -j$(nproc) install \
        DESTDIR=/output/grub-efi-amd64-signed \
        MAKEINFO=true

      GRUB_MODULES=" \
        all_video boot blscfg btrfs blsuki \
        cat configfile cryptodisk \
        echo ext2 f2fs fat font \
        gcry_rijndael gcry_rsa gcry_serpent \
        gcry_sha256 gcry_twofish gcry_whirlpool \
        gfxmenu gfxterm gzio \
        halt hfsplus http increment iso9660 \
        jpeg loadenv loopback linux lvm luks luks2 \
        memdisk mdraid09 mdraid1x minicmd net \
        normal part_apple part_msdos part_gpt \
        password_pbkdf2 pgp png reboot regexp \
        search search_fs_uuid search_fs_file \
        search_label serial sleep \
        squash4 syslinuxcfg \
        test tftp version video xfs zstd \
        efi_netfs efifwsetup efinet lsefi lsefimmap connectefi bli \
        backtrace chain tpm usb usbserial_common \
        usbserial_pl2303 usbserial_ftdi usbserial_usbdebug \
        keylayouts at_keyboard"

      mkdir -p \
        /output/grub-efi-amd64-signed/usr/lib/grub/x86_64-efi-signed

      ./grub-mkimage \
        -O x86_64-efi \
        -o /output/grub-efi-amd64-signed/usr/lib/grub/x86_64-efi-signed/grubx64.efi.signed \
        -d grub-core \
        -p /EFI/debian \
        ${GRUB_MODULES}

      cd /output/grub-efi-amd64-signed/
      ln -sf DEBIAN debian

      sed -i \
        -e "s|{{ VER }}|${GRUB_VER}|g" \
        DEBIAN/control
      rm -f debian

      # Sign the GRUB EFI binary with the Secure Boot signing key
      # Create key files with restrictive permissions immediately (umask 077
      # in a subshell) so they are never world-readable between creation and
      # the former chmod 600 call.
      (umask 077; echo "${SB_SIGNING_KEY}"  | base64 -d > /tmp/sb.key)
      (umask 077; echo "${SB_SIGNING_CERT}" | base64 -d > /tmp/sb.crt)

      sbsign \
        --key  /tmp/sb.key \
        --cert /tmp/sb.crt \
        --output /output/grub-efi-amd64-signed/usr/lib/grub/x86_64-efi-signed/grubx64.efi.signed \
        /output/grub-efi-amd64-signed/usr/lib/grub/x86_64-efi-signed/grubx64.efi.signed

      # Verify signature
      sbverify \
        --cert /tmp/sb.crt \
        /output/grub-efi-amd64-signed/usr/lib/grub/x86_64-efi-signed/grubx64.efi.signed \
        || { echo "ERROR: GRUB EFI signature verification failed" >&2; exit 1; }

      # Include the certificate in the package for MOK enrollment on target machines
      mkdir -p /output/grub-efi-amd64-signed/usr/share/debian-bootc
      cp /tmp/sb.crt \
        /output/grub-efi-amd64-signed/usr/share/debian-bootc/sb_signing.crt

      rm -f /tmp/sb.key /tmp/sb.crt

      chmod 755 /output/grub-efi-amd64-signed/DEBIAN/postinst
      dpkg-deb --build /output/grub-efi-amd64-signed \
        /debs/grub-efi-amd64-signed_${GRUB_VER}_amd64.deb

  - name: bootupd
    sources:
      - preinstall/output/bootupd
    env:
      CARGO_HOME: "/build/rust"
      RUSTUP_HOME: "/build/rust"
      BOOTUPD_VER: "v0.2.35"
      BOOTUPD_VENDOR_SHA256: "7ada7d0c9d1facb4c5a138e1b014191971b8e97a2fca690b86357e9888584e8b"
    build: |
      SAVE_PWD=$(pwd)
      rm -rf /build/vendor && mkdir /build/vendor

      git clone --depth=1 --branch "${BOOTUPD_VER}" \
        https://github.com/coreos/bootupd.git /build/bootupd

      curl -fsSL \
        "https://github.com/coreos/bootupd/releases/download/${BOOTUPD_VER}/bootupd-${BOOTUPD_VER#v}-vendor.tar.zstd" \
        -o /tmp/bootupd-vendor.tar.zstd
      printf '%s  /tmp/bootupd-vendor.tar.zstd\n' "${BOOTUPD_VENDOR_SHA256}" \
        | sha256sum -c -
      tar --zstd -x -C /build/ -f /tmp/bootupd-vendor.tar.zstd

      . ${RUSTUP_HOME}/env
      cargo build --release --manifest-path /build/bootupd/Cargo.toml

      make -C /build/bootupd install-all DESTDIR=/output/bootupd

      cd /output/bootupd/
      ln -sf DEBIAN debian

      dpkg-shlibdeps \
        -O /build/bootupd/target/release/bootupd \
        | sed 's/shlibs:Depends=//' > /tmp/bootupd-deps

      DEPS="$(cat /tmp/bootupd-deps), util-linux"
      sed -i \
        -e "s|{{ VER }}|${BOOTUPD_VER#v}|g" \
        -e "s|{{ DEPS }}|${DEPS}|g" \
        /output/bootupd/DEBIAN/control

      rm -f /output/bootupd/debian
      dpkg-deb --build /output/bootupd /debs/bootupd_${BOOTUPD_VER#v}_amd64.deb

  - name: libcomposefs
    sources:
      - preinstall/output/libcomposefs
    env:
      COMPOSEFS_VER: "v1.0.8"
    build: |
      git clone --depth=1 --branch "${COMPOSEFS_VER}" \
        https://github.com/composefs/composefs.git /build/composefs

      meson setup \
        --prefix=/usr \
        --libdir=/usr/lib \
        --buildtype=plain \
        /build/composefs-build \
        /build/composefs

      meson compile -C /build/composefs-build

      # Install to DESTDIR for packaging
      DESTDIR=/output/libcomposefs meson install -C /build/composefs-build

      # Install to system so ostree build finds it
      meson install -C /build/composefs-build

      cd /output/libcomposefs/
      ln -sf DEBIAN debian

      # Generate shlibs
      SO=$(find /output/libcomposefs/usr/lib -name "libcomposefs.so.*" ! -type l | head -1)
      SONAME=$(objdump -p $SO | awk '/SONAME/{print $2}')
      LIBBASE=$(echo $SONAME | sed 's/\.so\..*//')
      SOVERSION=$(echo $SONAME | sed 's/.*\.so\.//')
      echo "${LIBBASE} ${SOVERSION} libcomposefs" > /output/libcomposefs/DEBIAN/shlibs

      sed -i \
        -e "s|{{ VER }}|${COMPOSEFS_VER#v}|g" \
        DEBIAN/control

      rm -f debian
      dpkg-deb --build /output/libcomposefs \
        /debs/libcomposefs_${COMPOSEFS_VER#v}_amd64.deb

      # Install into the build environment so dpkg-shlibdeps can resolve libcomposefs
      # when building the ostree package in the next step.
      apt install -y /debs/libcomposefs_${COMPOSEFS_VER#v}_amd64.deb

  - name: ostree
    deps:
      - libcomposefs
    deb-glob: "libostree_*"
    sources:
      - preinstall/output/ostree
      - ostreepostinstall
    env:
      CARGO_HOME: "/build/rust"
      RUSTUP_HOME: "/build/rust"
      OSTREE_VER: "2026.1"
    build: |
      SAVE_PWD=$(pwd)
      rm -rf /build/vendor && mkdir /build/vendor

      curl -fsSL \
        https://github.com/ostreedev/ostree/releases/download/v${OSTREE_VER}/libostree-${OSTREE_VER}.tar.xz \
        | tar -xJ -C /build
      cd /build/libostree-${OSTREE_VER}

      ./configure --prefix=/usr --sysconfdir=/etc \
        --disable-gtk-doc --disable-man \
        --with-composefs \
        --with-systemdsystemunitdir=/usr/lib/systemd/system \
        --with-systemdsystemgeneratordir=/usr/lib/systemd/system-generators \
        --with-dracut

      make -j$(nproc)
      make -j$(nproc) install DESTDIR=/output/ostree

      # Verify and fail loudly if missing
      test -d /output/ostree/usr/lib/dracut/modules.d/50ostree \
        || { echo "ERROR: 50ostree dracut module missing from build output" >&2; exit 1; }
      test -f /output/ostree/usr/lib/systemd/system-generators/ostree-system-generator \
        || { echo "ERROR: ostree-system-generator missing from build output" >&2; exit 1; }

      cd /output/ostree/
      ln -sf DEBIAN debian

      dpkg-shlibdeps \
        -l/output/ostree/usr/lib \
        -O $(find . -name "libostree-1.so*" ! -name "*.la" | head -1) \
        | sed 's/shlibs:Depends=//' > /tmp/ostree-deps

      SO=$(find /output/ostree/usr/lib -name "libostree-1.so.*" ! -name "*.la" ! -type l | head -1)
      SONAME=$(objdump -p $SO | awk '/SONAME/{print $2}')
      LIBBASE=$(echo $SONAME | sed 's/\.so\..*//')
      SOVERSION=$(echo $SONAME | sed 's/.*\.so\.//')
      echo "${LIBBASE} ${SOVERSION} libostree" > /output/ostree/DEBIAN/shlibs

      DEPS=$(cat /tmp/ostree-deps)
      sed -i \
        -e "s|{{ VER }}|${OSTREE_VER}|g" \
        -e "s|{{ DEPS }}|${DEPS}|g" \
        /output/ostree/DEBIAN/control
      cp -r "${SAVE_PWD}"/workflows/bootc-debs-builder/ostreepostinstall/* /output/ostree/

      rm -f /output/ostree/debian
      dpkg-deb --build /output/ostree /debs/libostree_${OSTREE_VER}_amd64.deb
      apt install -y /debs/libostree_${OSTREE_VER}_amd64.deb

  - name: bootc
    deps:
      - ostree
    sources:
      - preinstall/output/bootc
      - bootcpostinstall
    env:
      CARGO_HOME: "/build/rust"
      RUSTUP_HOME: "/build/rust"
      BOOTC_VER: "v1.16.2"
      BOOTC_VENDOR_SHA256: "53d759ca521144a675af67e68d23c3f5f18dca784e4e900052d0cfdc4467732b"
    build: |
      SAVE_PWD=$(pwd)
      rm -rf /build/vendor && mkdir /build/vendor

      git clone --depth=1 --branch "${BOOTC_VER}" \
        https://github.com/bootc-dev/bootc.git /build/bootc

      curl -fsSL \
        "https://github.com/bootc-dev/bootc/releases/download/${BOOTC_VER}/bootc-${BOOTC_VER#v}-vendor.tar.zstd" \
        -o /tmp/bootc-vendor.tar.zstd
      printf '%s  /tmp/bootc-vendor.tar.zstd\n' "${BOOTC_VENDOR_SHA256}" \
        | sha256sum -c -
      tar --zstd -x -C /build/ -f /tmp/bootc-vendor.tar.zstd

      . ${RUSTUP_HOME}/env
      cargo build --release --manifest-path /build/bootc/Cargo.toml

      make -j$(nproc) -C /build/bootc manpages DESTDIR=/output/bootc
      make -C /build/bootc install-all DESTDIR=/output/bootc

      cd /output/bootc/
      ln -sf DEBIAN debian

      dpkg-shlibdeps \
        -l/output/ostree/usr/lib \
        -l/output/bootc/usr/lib \
        -S/output/ostree \
        -O /build/bootc/target/release/bootc \
        | sed 's/shlibs:Depends=//' > /tmp/bootc-deps

      DEPS=$(cat /tmp/bootc-deps)
      sed -i \
        -e "s|{{ VER }}|${BOOTC_VER#v}|g" \
        -e "s|{{ DEPS }}|${DEPS}|g"  \
        /output/bootc/DEBIAN/control
      cp -r "${SAVE_PWD}"/workflows/bootc-debs-builder/bootcpostinstall/* /output/bootc/

      chmod 755 \
        /output/bootc/DEBIAN/postinst \
        /output/bootc/usr/local/bin/bootc-finalize

      rm -f /output/bootc/debian
      dpkg-deb --build /output/bootc /debs/bootc_${BOOTC_VER#v}_amd64.deb

