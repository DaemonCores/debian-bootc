# Build-environment recipe for this repo's .deb builder.
#
# Consumed by the generic build-env reusable workflow, which assembles the image
# with buildah (no Containerfile) and pushes it to this repo's own GHCR as
# ghcr.io/<owner>/<repo>-buildenv. Rebuilt once a month; the per-package build
# jobs run inside it, so they start instantly instead of installing a toolchain.
#
#   base     base image to start from
#   env      environment variables baked into the image
#   phases   ordered list, each either `apt: [pkgs]` or `run: |script`, run in
#            order. SSL/clone deps MUST come first: the base image has no
#            ca-certificates, so any HTTPS step (curl, https apt) fails until
#            they are installed over the base HTTP sources.

base: debian:trixie

env:
  DEBIAN_FRONTEND: noninteractive
  CARGO_HOME: /build/rust
  RUSTUP_HOME: /build/rust

phases:
  # 1. Clone/SSL deps first, so HTTPS works for everything below.
  - apt:
      - ca-certificates
      - openssl
      - git
      - curl
      - wget

  # 2. Build deps for the from-source packages (grub, bootupd, libcomposefs,
  #    ostree, bootc) plus dpkg-dev/binutils/jq for packaging.
  - apt:
      - zstd
      - make
      - build-essential
      - go-md2man
      - libzstd-dev
      - pkgconf
      - autoconf
      - automake
      - libtool
      - libglib2.0-dev
      - libcurl4-openssl-dev
      - libgpgme-dev
      - libarchive-dev
      - libmount-dev
      - libfuse3-dev
      - libssl-dev
      - libsystemd-dev
      - gobject-introspection
      - libgirepository1.0-dev
      - libsoup-3.0-dev
      - bison
      - gperf
      - flex
      - gettext
      - python3
      - autopoint
      - gawk
      - meson
      - ninja-build
      - libfreetype6-dev
      - sbsigntool
      - dpkg-dev
      - binutils
      - jq

  # 3. yq for the manifest-driven build jobs.
  - run: |
      curl -fsSL \
        https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 \
        -o /usr/local/bin/yq
      chmod +x /usr/local/bin/yq

  # 4. Rust (minimal) at CARGO_HOME/RUSTUP_HOME=/build/rust.
  - run: |
      curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
        | sh -s -- --profile minimal -y
